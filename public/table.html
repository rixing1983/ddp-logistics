<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDP物流 — 集装箱追踪表</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
         background: #f0f2f5; color: #1a1a2e; min-height: 100vh; font-size: 13px; }

  /* TOP BAR */
  .topbar { background: #1a3a5c; color: #fff; padding: 10px 16px;
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .topbar h1 { font-size: 15px; font-weight: 700; white-space: nowrap; }
  .topbar .counts { font-size: 12px; color: #aac8e8; white-space: nowrap; }
  .topbar .spacer { flex: 1; }

  /* FILTER ROW */
  .filters { background: #fff; border-bottom: 1px solid #dde3ec; padding: 8px 12px;
             display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
             position: sticky; top: 44px; z-index: 99; }
  .filters input, .filters select { padding: 5px 9px; border: 1px solid #ccd3de;
    border-radius: 6px; font-size: 12px; outline: none; background: #f7f9fc; }
  .filters input { width: 200px; }
  .filters input:focus, .filters select:focus { border-color: #3a7bd5; background: #fff; }
  .tab-group { display: flex; gap: 4px; }
  .tab { padding: 4px 12px; border-radius: 16px; cursor: pointer; font-size: 12px; font-weight: 600;
         border: 1.5px solid #d0d7e3; background: #f7f9fc; color: #555; transition: all .15s; }
  .tab.active { background: #1a3a5c; color: #fff; border-color: #1a3a5c; }
  .stat-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .chip { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; }
  .chip-all   { background:#e8edf5; color:#1a3a5c; }
  .chip-pending    { background:#f5f5f5; color:#666; }
  .chip-isf        { background:#e3eeff; color:#1a5ac8; }
  .chip-inbond     { background:#e3e8ff; color:#4a3ac8; }
  .chip-hold       { background:#fee; color:#c00; }
  .chip-cleared    { background:#e6ffe6; color:#1a8a1a; }
  .chip-transit    { background:#fff3e0; color:#b85c00; }
  .chip-delivered  { background:#e6f4ea; color:#1a7a3a; }
  .chip.active-chip { outline: 2px solid #1a3a5c; }

  /* TABLE WRAPPER */
  .table-wrap { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 108px); }
  table { border-collapse: collapse; width: max-content; min-width: 100%; background: #fff; }

  thead th { background: #1a3a5c; color: #c8ddf0; font-size: 11px; font-weight: 700;
             padding: 8px 7px; white-space: nowrap; border-right: 1px solid #2a4a6c;
             position: sticky; top: 0; z-index: 10; letter-spacing: .3px; }
  thead th:first-child { left: 0; z-index: 11; }

  tbody tr { border-bottom: 1px solid #eceff4; transition: background .1s; }
  tbody tr:hover { background: #f0f5ff; }
  tbody td { padding: 7px 7px; white-space: nowrap; border-right: 1px solid #eaeef4; vertical-align: middle; }

  /* sticky first column */
  td:first-child, th:first-child { position: sticky; left: 0; background: #f7f9fc; z-index: 5; }
  tbody tr:hover td:first-child { background: #e8f0ff; }

  /* BADGES */
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; }
  .b-ys   { background:#ede9ff; color:#5a3ac8; }
  .b-mt   { background:#fff0e0; color:#c86000; }
  .b-pend { background:#f5f5f5; color:#666; border:1px solid #ddd; }
  .b-isf  { background:#e3eeff; color:#1a5ac8; }
  .b-bond { background:#e3e8ff; color:#4a3ac8; }
  .b-hold { background:#fee; color:#c00; border:1px solid #fcc; }
  .b-clr  { background:#e6ffe6; color:#1a8a1a; }
  .b-trn  { background:#fff3e0; color:#b85c00; }
  .b-del  { background:#e6f4ea; color:#1a7a3a; }

  .tick { color: #2a9a4a; font-weight: 900; }
  .cross { color: #aaa; }
  .hold-flag { color: #c00; font-weight: 700; }
  .notes-cell { max-width: 220px; overflow: hidden; text-overflow: ellipsis; color: #777; font-size: 11px; }
  .addr-cell  { max-width: 200px; overflow: hidden; text-overflow: ellipsis; color: #555; font-size: 11px; }
  .driver-cell { max-width: 160px; overflow: hidden; text-overflow: ellipsis; font-size: 11px; }
  .date-cell { color: #2a7acc; font-size: 12px; }
  .price-cell { font-weight: 700; color: #1a7a3a; }

  .no-data { text-align: center; padding: 60px; color: #999; font-size: 15px; }
  .loading { text-align: center; padding: 60px; color: #999; }

  /* LEGEND */
  .legend { display: flex; gap: 8px; flex-wrap: wrap; padding: 6px 12px;
            background: #f7f9fc; border-top: 1px solid #eaeef4; font-size: 11px; color: #777; }
  .legend span { display: flex; align-items: center; gap: 3px; }

  @media print {
    .topbar, .filters, .legend { position: relative; }
    .table-wrap { max-height: none; overflow: visible; }
    body { font-size: 10px; }
    thead th { background: #1a3a5c !important; -webkit-print-color-adjust: exact; color: #fff !important; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div>🚢</div>
  <h1>DDP物流追踪 — 集装箱总览</h1>
  <span class="counts" id="count-label">加载中...</span>
  <div class="spacer"></div>
  <span style="font-size:11px;color:#7aa8cc">中国 → 美国 → 墨西哥</span>
</div>

<div class="filters">
  <input type="text" id="search" placeholder="🔍  搜索柜号、货描、备注...">
  <div class="tab-group" id="cust-tabs">
    <div class="tab active" data-cust="">全部客户</div>
    <div class="tab" data-cust="Yingsheng">Yingsheng</div>
    <div class="tab" data-cust="MYTOP">MYTOP</div>
  </div>
  <select id="status-filter">
    <option value="">全部状态</option>
    <option value="PENDING">待处理</option>
    <option value="ISF_FILED">ISF已报</option>
    <option value="IN_BOND">In-Bond</option>
    <option value="CBP_HOLD">CBP扣押</option>
    <option value="CLEARED">已放行</option>
    <option value="IN_TRANSIT_MX">墨西哥运输中</option>
    <option value="DELIVERED">已送达</option>
  </select>
  <select id="size-filter">
    <option value="">全部类型</option>
    <option value="40HC">40HC</option>
    <option value="TRANSFER">转运</option>
  </select>
  <div class="stat-chips" id="stat-chips"></div>
</div>

<div class="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th>#</th>
        <th>客户</th>
        <th>柜号</th>
        <th>货描</th>
        <th>尺寸</th>
        <th>数量</th>
        <th>货重</th>
        <th>ETD</th>
        <th>ETA</th>
        <th>ISF</th>
        <th>In-Bond#</th>
        <th>到港</th>
        <th>卸船</th>
        <th>CBP放行</th>
        <th>CBP扣押</th>
        <th>布朗斯维尔</th>
        <th>墨西哥海关</th>
        <th>拆箱完成</th>
        <th>配送完成</th>
        <th>状态</th>
        <th>目的地</th>
        <th>司机/联系人</th>
        <th>收货联系人</th>
        <th>报价(USD)</th>
        <th>备注</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="25" class="loading">正在加载集装箱数据...</td></tr>
    </tbody>
  </table>
</div>

<div class="legend">
  <b>状态说明：</b>
  <span><span class="badge b-pend">待处理</span> 尚未出港</span>
  <span><span class="badge b-isf">ISF已报</span> 已提交ISF</span>
  <span><span class="badge b-bond">In-Bond</span> 在途保税</span>
  <span><span class="badge b-hold">CBP扣押</span> 海关检查</span>
  <span><span class="badge b-clr">已放行</span> CBP通关</span>
  <span><span class="badge b-trn">运输中</span> 墨西哥境内</span>
  <span><span class="badge b-del">已送达</span> 完成配送</span>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────
const KEY = new URLSearchParams(location.search).get('key') || 'ddp2026';

// ── Status helpers ──────────────────────────────────────────────────────
const S_LABEL = {
  PENDING:'待处理', ISF_FILED:'ISF已报', IN_BOND:'In-Bond',
  CBP_HOLD:'CBP扣押', CLEARED:'已放行', IN_TRANSIT_MX:'运输中', DELIVERED:'已送达'
};
const S_CLASS = {
  PENDING:'b-pend', ISF_FILED:'b-isf', IN_BOND:'b-bond',
  CBP_HOLD:'b-hold', CLEARED:'b-clr', IN_TRANSIT_MX:'b-trn', DELIVERED:'b-del'
};
function hasMark(v){ return v && v!=='/' && v!=='—' && v!=='-' && String(v).trim()!==''; }
function autoStatus(c){
  if(hasMark(c.m_delivered))   return 'DELIVERED';
  if(hasMark(c.cbp_hold))      return 'CBP_HOLD';
  if(hasMark(c.m_mx_customs)||hasMark(c.m_unpacked)) return 'IN_TRANSIT_MX';
  if(hasMark(c.m_brownsville)) return 'IN_TRANSIT_MX';
  if(hasMark(c.m_cleared)||hasMark(c.m_unloaded))    return 'CLEARED';
  if(hasMark(c.m_arrived))     return 'IN_BOND';
  if(hasMark(c.isf_filed))     return 'ISF_FILED';
  return 'PENDING';
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function dateCell(v){ return v ? `<span class="date-cell">${esc(v)}</span>` : '<span style="color:#ccc">—</span>'; }
function checkCell(v){ return hasMark(v) ? `<span class="tick">✓</span>` : '<span class="cross">—</span>'; }

// ── State ───────────────────────────────────────────────────────────────
let allRows = [];
let filterCust = '';
let filterStatus = '';
let filterSize = '';
let searchQ = '';

// ── Fetch ───────────────────────────────────────────────────────────────
async function loadData(){
  try {
    // Try shared endpoint first, fall back to admin login
    let rows;
    try {
      const r = await fetch('/api/view/containers?key=' + encodeURIComponent(KEY));
      if(!r.ok) throw new Error('not ok');
      rows = await r.json();
    } catch(e1) {
      // fallback: try admin login
      const lr = await fetch('/api/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email:'admin@ddplogistics.com', password:'Admin2026!'})
      });
      if(!lr.ok) throw new Error('Auth failed');
      const ld = await lr.json();
      const cr = await fetch('/api/containers', { headers:{'Authorization':'Bearer '+ld.token} });
      rows = await cr.json();
    }
    allRows = Array.isArray(rows) ? rows : [];
    buildStatChips();
    render();
  } catch(e){
    document.getElementById('tbody').innerHTML = `<tr><td colspan="25" class="no-data">❌ 加载失败：${esc(e.message)}</td></tr>`;
  }
}

// ── Stat chips ──────────────────────────────────────────────────────────
function buildStatChips(){
  const counts = {};
  allRows.forEach(c=>{
    const s = autoStatus(c);
    counts[s] = (counts[s]||0)+1;
  });
  const order = ['PENDING','ISF_FILED','IN_BOND','CBP_HOLD','CLEARED','IN_TRANSIT_MX','DELIVERED'];
  const labels = {PENDING:'待处理',ISF_FILED:'ISF',IN_BOND:'In-Bond',CBP_HOLD:'CBP扣',CLEARED:'放行',IN_TRANSIT_MX:'运输中',DELIVERED:'已送达'};
  const cls = {PENDING:'chip-pending',ISF_FILED:'chip-isf',IN_BOND:'chip-inbond',CBP_HOLD:'chip-hold',CLEARED:'chip-cleared',IN_TRANSIT_MX:'chip-transit',DELIVERED:'chip-delivered'};
  const el = document.getElementById('stat-chips');
  el.innerHTML = `<span class="chip chip-all" data-s="" title="全部 ${allRows.length} 柜">全部 ${allRows.length}</span>` +
    order.filter(s=>counts[s]).map(s=>
      `<span class="chip ${cls[s]}" data-s="${s}" title="${S_LABEL[s]} ${counts[s]} 柜">${labels[s]} ${counts[s]}</span>`
    ).join('');
  el.querySelectorAll('.chip').forEach(ch=>{
    ch.addEventListener('click',()=>{
      filterStatus = ch.dataset.s;
      document.getElementById('status-filter').value = filterStatus;
      el.querySelectorAll('.chip').forEach(x=>x.classList.remove('active-chip'));
      ch.classList.add('active-chip');
      render();
    });
  });
  // mark "全部" as active initially
  el.querySelector('.chip[data-s=""]').classList.add('active-chip');
}

// ── Render ───────────────────────────────────────────────────────────────
function render(){
  const q = searchQ.toLowerCase().trim();
  let list = allRows.filter(c=>{
    if(filterCust && c.customer !== filterCust) return false;
    if(filterSize && c.size !== filterSize) return false;
    const s = autoStatus(c);
    if(filterStatus && s !== filterStatus) return false;
    if(q){
      const hay = [c.container,c.description,c.notes,c.delivery_address,c.mx_driver,c.in_bond].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('count-label').textContent =
    `显示 ${list.length} / ${allRows.length} 柜`;

  if(!list.length){
    document.getElementById('tbody').innerHTML = `<tr><td colspan="25" class="no-data">暂无数据</td></tr>`;
    return;
  }

  document.getElementById('tbody').innerHTML = list.map((c,i)=>{
    const s = autoStatus(c);
    const custCls = c.customer==='Yingsheng' ? 'b-ys' : 'b-mt';
    const price = c.price ? `<span class="price-cell">$${Number(c.price).toLocaleString()}</span>` : '<span style="color:#ccc">—</span>';
    const cbpHold = (c.cbp_hold && c.cbp_hold!='0') ? `<span class="hold-flag">⚠️ YES</span>` : '<span class="cross">—</span>';
    return `<tr>
      <td style="text-align:center;color:#999;font-size:11px">${i+1}</td>
      <td><span class="badge ${custCls}">${esc(c.customer)}</span></td>
      <td><b style="font-family:monospace;font-size:12px;color:#1a3a5c">${esc(c.container)}</b></td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis" title="${esc(c.description||'')}">${esc(c.description||'—')}</td>
      <td style="color:#555">${esc(c.size||'—')}</td>
      <td style="text-align:right;color:#555">${c.qty||'—'}</td>
      <td style="color:#555;white-space:nowrap">${esc(c.weight||'—')}</td>
      <td>${dateCell(c.etd)}</td>
      <td>${dateCell(c.eta)}</td>
      <td>${checkCell(c.isf_filed)}</td>
      <td style="font-family:monospace;font-size:11px;color:#444">${esc(c.in_bond||'—')}</td>
      <td>${dateCell(c.m_arrived)}</td>
      <td>${dateCell(c.m_unloaded)}</td>
      <td>${dateCell(c.m_cleared)}</td>
      <td>${cbpHold}</td>
      <td>${dateCell(c.m_brownsville)}</td>
      <td>${dateCell(c.m_mx_customs)}</td>
      <td>${dateCell(c.m_unpacked)}</td>
      <td>${dateCell(c.m_delivered)}</td>
      <td><span class="badge ${S_CLASS[s]}">${S_LABEL[s]}</span></td>
      <td class="addr-cell" title="${esc(c.delivery_address||'')}">${esc(c.delivery_address||'—')}</td>
      <td class="driver-cell" title="${esc(c.mx_driver||'')}">${esc(c.mx_driver||'—')}</td>
      <td style="font-size:11px;color:#555;white-space:normal;max-width:140px" title="${esc(c.consignee_contact||'')}">${esc(c.consignee_contact||'—')}</td>
      <td>${price}</td>
      <td class="notes-cell" title="${esc(c.notes||'')}">${esc(c.notes||'—')}</td>
    </tr>`;
  }).join('');
}

// ── Event listeners ─────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e=>{
  searchQ = e.target.value; render();
});
document.getElementById('status-filter').addEventListener('change', e=>{
  filterStatus = e.target.value;
  document.querySelectorAll('#stat-chips .chip').forEach(x=>x.classList.remove('active-chip'));
  const active = document.querySelector(`#stat-chips .chip[data-s="${filterStatus}"]`);
  if(active) active.classList.add('active-chip');
  render();
});
document.getElementById('size-filter').addEventListener('change', e=>{
  filterSize = e.target.value; render();
});
document.querySelectorAll('#cust-tabs .tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('#cust-tabs .tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    filterCust = t.dataset.cust;
    render();
  });
});

// ── Init ────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
