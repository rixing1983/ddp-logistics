<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DDP物流平台 | 管理后台</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;}
.sidebar{width:220px;min-height:100vh;background:#1e293b;position:fixed;left:0;top:0;z-index:50;}
.main{margin-left:220px;min-height:100vh;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;border-radius:8px;margin:2px 8px;font-size:14px;color:#94a3b8;transition:all .15s;}
.nav-item:hover,.nav-item.active{background:#334155;color:#f1f5f9;}
.card{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155;}
.stat-card{background:#1e293b;border-radius:12px;padding:16px 20px;border:1px solid #334155;}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-primary{background:#3b82f6;color:#fff;border:none;}
.btn-primary:hover{background:#2563eb;}
.btn-danger{background:#ef4444;color:#fff;border:none;}
.btn-danger:hover{background:#dc2626;}
.btn-ghost{background:transparent;color:#94a3b8;border:1px solid #334155;}
.btn-ghost:hover{background:#334155;color:#e2e8f0;}
.btn-success{background:#10b981;color:#fff;border:none;}
.btn-success:hover{background:#059669;}
input,select,textarea{background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px;width:100%;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;color:#64748b;font-size:11px;text-transform:uppercase;border-bottom:1px solid #334155;}
td{padding:10px 12px;border-bottom:1px solid #1e293b;vertical-align:middle;}
tr:hover td{background:#1e293b;}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-green{background:#064e3b;color:#6ee7b7;}
.badge-blue{background:#1e3a5f;color:#93c5fd;}
.badge-orange{background:#431407;color:#fdba74;}
.badge-red{background:#450a0a;color:#fca5a5;}
.badge-gray{background:#1e293b;color:#94a3b8;}
.badge-indigo{background:#1e1b4b;color:#a5b4fc;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:#1e293b;border-radius:16px;padding:28px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;border:1px solid #334155;}
.modal-lg{max-width:900px;}
.chat-bubble{max-width:75%;padding:8px 14px;border-radius:12px;font-size:13px;line-height:1.5;margin:3px 0;}
.chat-mine{background:#1d4ed8;color:#fff;margin-left:auto;border-bottom-right-radius:4px;}
.chat-other{background:#334155;color:#e2e8f0;margin-right:auto;border-bottom-left-radius:4px;}
.tab-btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#64748b;background:transparent;border:none;}
.tab-btn.active{background:#334155;color:#f1f5f9;}
.unread-badge{background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:4px;}
.milestone-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.milestone-done{background:#10b981;}
.milestone-pending{background:#334155;border:2px solid #475569;}
.milestone-line{width:2px;height:16px;margin:0 auto;}
.milestone-line-done{background:#10b981;}
.milestone-line-pending{background:#334155;}
</style>
</head>
<body>
<!-- Sidebar -->
<div class="sidebar flex flex-col py-6">
  <div class="px-5 mb-8">
    <div class="text-xl font-black text-white">🚢 DDP管理后台</div>
    <div class="text-xs text-slate-500 mt-1">China → US → Mexico</div>
  </div>
  <nav class="flex-1 space-y-1">
    <div class="nav-item active" id="nav-dashboard" onclick="showSection('dashboard')">📊 <span>数据总览</span></div>
    <div class="nav-item" id="nav-containers" onclick="showSection('containers')">📦 <span>集装箱管理</span></div>
    <div class="nav-item" id="nav-invoices" onclick="showSection('invoices')">💰 <span>发票账单</span></div>
    <div class="nav-item" id="nav-users" onclick="showSection('users')">👥 <span>用户管理</span></div>

<!-- Main -->

<!-- Dashboard -->
<div id="section-dashboard">

  <div class="card overflow-x-auto">

<!-- Invoices -->

  </div>
</div>

<!-- Users -->
<div id="section-users" class="hidden">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-black text-white">用户管理</h2>
    <button onclick="openUserModal()" class="btn btn-primary">+ 新建用户</button>
  </div>
  <div class="card overflow-x-auto">
    <table>
      <thead><tr>
        <th>姓名</th><th>邮箱</th><th>角色</th><th>公司</th><th>创建时间</th><th>操作</th>

<div id="section-messages" class="hidden">

  <div class="flex gap-4" style="height:600px;">

<script src="/socket.io/socket.io.js"></script>
<script>
const TOKEN = localStorage.getItem('ddp_token');
let adminUser = null;
let containers = [], invoices = [], users = [];
let currentSection = 'dashboard';
let currentChannel = null;
let socket = null;
let editingContainerId = null, editingInvoiceId = null, editingUserId = null;

if (!TOKEN) { window.location.href = '/'; }

// ---- API helper ----
async function api(path, method='GET', body=null) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + TOKEN } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  if (r.status === 401) { localStorage.removeItem('ddp_token'); window.location.href = '/'; }
  if (!r.ok) { const d = await r.json().catch(()=>({})); throw new Error(d.error || r.statusText); }
  return r.json();
}

function logout() { localStorage.removeItem('ddp_token'); localStorage.removeItem('ddp_user'); window.location.href = '/'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ---- Status helpers ----
const STATUS_LABEL = {
  PENDING:'待处理', ISF_FILED:'ISF已报', IN_BOND:'In-Bond',
  CBP_HOLD:'海关扣押', CLEARED:'已放行', IN_TRANSIT_MX:'墨西哥运输中', DELIVERED:'已送达'
};
const STATUS_CLASS = {
  PENDING:'badge-gray', ISF_FILED:'badge-blue', IN_BOND:'badge-blue',
  CBP_HOLD:'badge-red', CLEARED:'badge-green', IN_TRANSIT_MX:'badge-orange', DELIVERED:'badge-green'
};
function hasMark(v) { return v && v !== '/' && v !== '—' && v !== '-' && String(v).trim() !== ''; }
function autoStatus(c) {
  if (hasMark(c.delivered_date)) return 'DELIVERED';
  if (hasMark(c.cbp_hold)) return 'CBP_HOLD';
  if (hasMark(c.mx_customs) || hasMark(c.unpacked)) return 'IN_TRANSIT_MX';
  if (hasMark(c.arrived_brownsville)) return 'IN_TRANSIT_MX';
  if (hasMark(c.cbp_released) || hasMark(c.unloaded)) return 'CLEARED';
  if (hasMark(c.arrived_port)) return 'IN_BOND';
  if (hasMark(c.isf_filed)) return 'ISF_FILED';
  return 'PENDING';
}

// ---- Navigation ----
function showSection(name) {
  ['dashboard','containers','invoices','users','messages'].forEach(s => {
    document.getElementById('section-'+s).classList.toggle('hidden', s !== name);
    document.getElementById('nav-'+s).classList.toggle('active', s === name);
  });
  currentSection = name;
  if (name === 'dashboard') loadDashboard();
  if (name === 'containers') renderContainerTable();
  if (name === 'invoices') { renderInvoiceStats(); renderInvoiceTable(); }
  if (name === 'users') renderUserTable();
  if (name === 'messages') loadChannels();
}

// ---- Dashboard ----
async function loadDashboard() {
  try {
    const stats = await api('/api/stats');
    const cards = [
      {label:'全部集装箱', value: stats.total, icon:'📦', color:'blue'},
      {label:'In-Bond/在途', value: (stats.by_status?.IN_BOND||0)+(stats.by_status?.IN_TRANSIT_MX||0), icon:'🚢', color:'indigo'},
      {label:'已送达', value: stats.by_status?.DELIVERED||0, icon:'✅', color:'green'},
      {label:'海关扣押', value: stats.by_status?.CBP_HOLD||0, icon:'⚠️', color:'red'},
      {label:'Yingsheng', value: stats.by_customer?.Yingsheng||0, icon:'🟣', color:'purple'},
      {label:'MYTOP', value: stats.by_customer?.MYTOP||0, icon:'🟠', color:'orange'},
      {label:'待付账单', value: stats.invoice_pending||0, icon:'📄', color:'yellow'},
      {label:'总收入(USD)', value: '$'+(stats.total_revenue||0).toLocaleString(), icon:'💵', color:'teal'},
    ];
    document.getElementById('stat-cards').innerHTML = cards.map(c=>`
      <div class="stat-card">
        <div class="text-2xl mb-1">${c.icon}</div>
        <div class="text-2xl font-black text-white">${c.value}</div>
        <div class="text-xs text-slate-400 mt-1">${c.label}</div>
      </div>`).join('');

    // Recent containers
    const recent = [...containers].sort((a,b)=>b.id-a.id).slice(0,6);

// ---- Messages ----
const CHANNELS = [
  {id:'general',label:'📢 全体公告'},
  {id:'admin-customer:Yingsheng',label:'🟣 Yingsheng客户'},
  {id:'admin-customer:MYTOP',label:'🟠 MYTOP客户'},
  {id:'admin-vendor:RF Express',label:'🚛 RF Express承运商'},
  {id:'admin-vendor:Wingo Tech',label:'🏭 Wingo Tech发货商'}
];

let channelMessages = {};
let unreadByChannel = {};

function loadChannels() {
  const list = document.getElementById('channel-list');
  list.innerHTML = CHANNELS.map(ch=>`
    <div id="chan-${ch.id.replace(/[^a-z0-9]/gi,'_')}" class="nav-item" onclick="switchChannel('${esc(ch.id)}','${esc(ch.label)}')">
      <span class="flex-1">${ch.label}</span>
      <span id="ubadge-${ch.id.replace(/[^a-z0-9]/gi,'_')}" class="hidden unread-badge">!</span>
    </div>`).join('');
  if (!currentChannel) switchChannel('general','📢 全体公告');
  setupSocket();
  pollUnread();
}

function setupSocket() {
  if (socket) return;
  socket = io({ auth: { token: TOKEN } });
  socket.on('connect', ()=>{
    CHANNELS.forEach(ch=>socket.emit('join', ch.id));
  });
  socket.on('new_message', msg=>{
    if (!channelMessages[msg.channel]) channelMessages[msg.channel] = [];
    channelMessages[msg.channel].push(msg);
    if (msg.channel === currentChannel) appendMessage(msg);
    else markChannelUnread(msg.channel);
    updateGlobalUnread();
  });
}

async function switchChannel(channelId, label) {
  currentChannel = channelId;
  document.getElementById('chat-header').textContent = label;
  document.getElementById('chat-msgs').innerHTML = '<div class="text-center text-slate-500 text-sm py-4">加载中…</div>';

  // Clear unread for this channel
  unreadByChannel[channelId] = 0;
  const safeId = channelId.replace(/[^a-z0-9]/gi,'_');
  const badge = document.getElementById('ubadge-'+safeId);
  if (badge) badge.classList.add('hidden');

  // Mark active channel
  CHANNELS.forEach(ch=>{
    const el = document.getElementById('chan-'+ch.id.replace(/[^a-z0-9]/gi,'_'));
    if (el) el.classList.toggle('active', ch.id===channelId);
  });

  try {
    const msgs = await api('/api/messages?channel='+encodeURIComponent(channelId));
    channelMessages[channelId] = msgs;
    // Mark all read
    await Promise.all(msgs.filter(m=>!m.is_read).map(m=>
      api('/api/messages/'+m.id+'/read','POST').catch(()=>{})
    ));
    renderMessages(msgs);
    updateGlobalUnread();
  } catch(e) {
    document.getElementById('chat-msgs').innerHTML = '<div class="text-center text-red-400 text-sm py-4">加载失败</div>';
  }
}

function renderMessages(msgs) {
  const box = document.getElementById('chat-msgs');
  if (!msgs.length) { box.innerHTML = '<div class="text-center text-slate-500 text-sm py-8">暂无消息，开始对话吧</div>'; return; }
  box.innerHTML = msgs.map(m=>msgHtml(m)).join('');
  box.scrollTop = box.scrollHeight;
}

function appendMessage(m) {
  const box = document.getElementById('chat-msgs');
  const placeholder = box.querySelector('.text-center.text-slate-500');
  if (placeholder) placeholder.remove();
  box.insertAdjacentHTML('beforeend', msgHtml(m));
  box.scrollTop = box.scrollHeight;
}

function msgHtml(m) {
  const mine = m.sender_id === adminUser?.id;
  const time = new Date(m.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  return `<div class="flex flex-col ${mine?'items-end':'items-start'} mb-1">
    <div class="text-xs text-slate-500 mb-1">${mine?'':esc(m.sender_name)+' · '}${time}</div>
    <div class="chat-bubble ${mine?'chat-mine':'chat-other'}">${esc(m.content)}</div>
  </div>`;
}

function markChannelUnread(channelId) {
  unreadByChannel[channelId] = (unreadByChannel[channelId]||0)+1;
  const safeId = channelId.replace(/[^a-z0-9]/gi,'_');
  const badge = document.getElementById('ubadge-'+safeId);
  if (badge) { badge.textContent = '!'; badge.classList.remove('hidden'); }
}

async function pollUnread() {
  try {
    const d = await api('/api/messages/unread-count');
    updateGlobalUnreadCount(d.count||0);
  } catch(e){}
  setTimeout(pollUnread, 30000);
}

function updateGlobalUnread() {
  const total = Object.values(unreadByChannel).reduce((a,b)=>a+b,0);
  updateGlobalUnreadCount(total);
}

function updateGlobalUnreadCount(n) {
  const badge = document.getElementById('msg-badge');
  if (!badge) return;
  if (n > 0) { badge.textContent = n>99?'99+':n; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const content = input.value.trim();
  if (!content || !currentChannel) return;
  input.value = '';
  try {
    const msg = await api('/api/messages','POST',{channel:currentChannel,content});
    // Socket will broadcast, but also append locally for immediate feedback
  } catch(e) { alert('发送失败: '+e.message); input.value = content; }
}

// ---- Modal helpers ----
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') ['container-modal','invoice-modal','user-modal','detail-modal'].forEach(closeModal); });
['container-modal','invoice-modal','user-modal','detail-modal'].forEach(id=>{
  const el = document.getElementById(id);
  if(el) el.addEventListener('click',e=>{ if(e.target===el) closeModal(id); });
});

// ---- Init ----
async function init() {
  try {
    adminUser = await api('/api/me');
    if (adminUser.role !== 'admin') { window.location.href = '/portal'; return; }
    document.getElementById('admin-info').textContent = adminUser.name || adminUser.email;
    [containers, invoices, users] = await Promise.all([
      api('/api/containers'),
      api('/api/invoices'),
      api('/api/users')
    ]);
    loadDashboard();
  } catch(e) { window.location.href = '/'; }
}
init();
</script>
